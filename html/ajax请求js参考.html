<head>
<title>ajax请求</title>

<script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
    .load{
        width:500px;
        height:300px;
        border:1px solid #abcdef;
    }
</style>
</head>
    <body>
        <input type="text" name="username" id="username" />
        <input type="button" value="GO"/>
        <div class="load" id="info">
            <img src="http://localhost:8080/resource/image/avatar.png" alt="" id="loading" style="display:none"/>
            <ul></ul>
        </div>
        <span style="color:red"></span>
    </body>


<script>




//例5.ajax
$('input[type=button]').click(function(){
    var url = 'pro.php';
    var sendData = {'username':$('#username').val()};
    $.ajax({
        url:url,                // 向服务器发送的请求地址
        type:'get',             // GET方式传输
        data:sendData,          // 发送的数据
        success:function(data){ // 回调函数
             if(data == 'true') {
                $('div').html('用户名可以使用');
             } else {
                $('div').html('用户名不可以是admin');
             }
        }
    });
})

// 例6.ajax
$('input').click(function(){
    $.ajax({
        url:'pro.php?'+Math.random(),
        type:'get',
        success:function(data){
            //alert(data);
            $('#info').html(data);//$('#info') DIV中的ID
        }
    });
});

$('input').click(function(){
    $.ajax({
        //url:'pro.php?'+Math.random(),
        url:'test.php/a',
        type:'get',
        success:function(data){
            alert(data);
            //$('#info').html(data);//$('#info') DIV中的ID
        }
    });
});

// 数组和对象
// 数组  var a = [1,2,3,4];alert(a[1]);
// 对象  var a = {color:'yellow',hex:'#f90'}alert(a.color);

$('input').click(function(){
    $.ajax({
        url:'pro.php?'+Math.random(),
        type:'get',
        success:function(data){
            //alert(data[0].title);
            //$('#info').html(data[0].title);//$('#info') DIV中的ID
            //alert(typeof data);   //string
            var res = eval(data);   // eval 把字符串解析成js代码对象
            //alert(typeof res);      //object
            $('#info').html(res[0].title);
        }
    });
});


// 复杂的数组和JSON格式
$('input').click(function(){
    var ul = $('#info>ul'); // 获取ul
    $.ajax({
        url:'pro.php?'+Math.random(),
        type:'get',
        success:function(data){
            //alert(data);
            var result = eval(data);
            for(var i=0;i<result.length;i++){
                //alert(result[i].title);
                ul.append('<li>'+result[i].title+' <em>'+result[i].time+'</em></li>');//向某个标签插入某些元素
            }
        }

    });
});

// 复杂的数组和JSON格式+延迟
$('input').click(function(){
    var ul = $('#info>ul'); // 获取ul
    $.ajax({
        url:'pro.php?'+Math.random(),
        type:'get',
        success:function(data){
            //alert(data);
            var result = eval(data);
            for(var i=0;i<result.length;i++){
                //alert(result[i].title);
                ul.append('<li>'+result[i].title+' <em>'+result[i].time+'</em></li>');//向某个标签插入某些元素
            }
        }

    });
});
$(document).ajaxStart(function(){   // 显示加载图片
    $('#loading').show();
}).ajaxStop(function(){             // 图片消失
    $('#loading').hide();
});

//GBK数据获取,发送与接收端编码要保持一致
$('input').click(function(){
    $.ajax({
        url:'test.txt?'+Math.random(),
        type:'get',
        success:function(data){
            $('div').html(data);
        }
    });
});
//.serialize();辅助函数,方便获取列表


// XML文件获取
$('input').click(function(){
    var ul = $('#info>ul');
    $.ajax({
        url:'xml.php?'+Math.random(),
        type:'get',
        dataType:'xml',
        success:function(xml){
            //alert(xml);
            $(xml).find('title').each(function(){
                //alert($(this).text());//操作XML文件时,html()方法不可用
                ul.append('<li>'+$(this).text()+'</li>');
            });
            //$('div').html(data);
        }
    });
});


//JQ中ajax请求出错处理
$('input').click(function(){
    var ul = $('#info>ul'); // 获取ul
    $.ajax({
        url:'pro1.php?'+Math.random(),
        type:'get',
        //timeout:1000,// 毫秒
        success:function(data){
            $('div').html(data);
        },
        error:function(jqXHR,textStatus,errorThrown){
            //alert('textStatus:'+textStatus);
            //alert('errorThrown:'+errorThrown);
            //if(errorThrown == 'Not Found') {$('span').html('你请求的地址不存在!');}
            //if(textStatus == 'timeout'){$('span').html('请求超时,请刷新页面重新操作!');}
        }

    });
});
$(document).ajaxError(function(){//只要ajax发生错误就执行代码
    $('span').html('ajax请求发生错误');
});
</script>
