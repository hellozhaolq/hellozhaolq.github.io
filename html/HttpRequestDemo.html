<script>
	// jQuery $.get() 方法
	// $.get(URL,data,function(data,status,xhr),dataType)
	$('#LoginGet').click(function(){
		// var url = $('#requestAddress').val() + '?timestamp=' + getTimestamp();
		var url = $('#requestAddress').val();
		var sendData = getSendData(); // 发送数据必须是JSON格式
		$.get(url, sendData, function(data, textStatus, xhr){
			console.log('data', data);
			console.log('textStatus', textStatus);
			console.log('xhr', xhr);
			$('#info').html(JSON.stringify(data));
		});
	});


	// jQuery $.post() 方法。与GET一模一样,只需要把$.get改成$.post
	// $(selector).post(URL,data,function(data,status,xhr),dataType)
	$('#LoginPost').click(function(){
		var url = $('#requestAddress').val();
		var sendData = getSendData();
		$.post(url, sendData, function(data, textStatus, xhr){
			console.log('data', data);
			console.log('textStatus', textStatus);
			console.log('xhr', xhr);
			$('#info').html(JSON.stringify(data));
		});
	});


	// jQuery ajax() 方法
	$('#LoginAjax').click(function(){
		var url = $('#requestAddress').val();
		var sendData = getSendData();
		$.ajax({
			url: url,                // 向服务器发送的请求地址
			type: 'get',             // GET方式传输
			data: sendData,          // 发送的数据
			success: function(data, textStatus, xhr){ // 回调函数
				console.log('data', data);
				console.log('textStatus', textStatus);
				console.log('xhr', xhr);
				console.log(xhr.getAllResponseHeaders());
				console.log(xhr.getResponseHeader("access-control-allow-origin"));
				
				$('#info').html(JSON.stringify(data));
			}
		});
	});







	function getSendData(){
		// 拼接JSON
		var sendData = {
			account: $('#acc').val(),
			password: $('#pwd').val(),
			verifycode: $('#verifycode').val()
			};
		return sendData;
	}

	function getTimestamp(){
		// 时间戳或随机数解决URL缓存
		var timestamp = new Date().getTime();
		var random = Math.round(Math.random() * 100000000);
		return timestamp + '' + random;
	}
</script>


<script>
	function updateSize() {
	  let nBytes = 0,
		  oFiles = document.getElementById("hideFileInput").files,
		  nFiles = oFiles.length;
	  for (let nFileId = 0; nFileId < nFiles; nFileId++) {
		nBytes += oFiles[nFileId].size;
	  }
	  let sOutput = nBytes + " bytes";
	  // optional code for multiples approximation
	  const aMultiples = ["KiB", "MiB", "GiB", "TiB", "PiB", "EiB", "ZiB", "YiB"];
	  for (nMultiple = 0, nApprox = nBytes / 1024; nApprox > 1; nApprox /= 1024, nMultiple++) {
		sOutput = nApprox.toFixed(3) + " " + aMultiples[nMultiple] + " (" + nBytes + " bytes)";
	  }
	  // end of optional code
	  document.getElementById("fileNum").innerHTML = nFiles;
	  document.getElementById("fileSize").innerHTML = sOutput;
	}
	
	// 通过click()方法使用隐藏的file input元素
	$('#fileSelectButton').click(function(){
		$('#hideFileInput').click();
	});

	var inputButtonClickNum = 0;
	$('#inputButton').click(function(){
		$('#inputButtonClicks').html(++inputButtonClickNum);
		// $('#inputButtonClicks').text(++inputButtonClickNum);
	});
	
	$('#copyColorPicker2').click(function(){
		$('#copyColorPicker').click();
	});
	$('#copyColorPicker').click(function(){
		var colorHexCode = $('#colorPicker').val();
		var inputEle = document.createElement('input');
		inputEle.setAttribute('value', colorHexCode);
		document.body.appendChild(inputEle);
		inputEle.select();
		document.execCommand("copy");
		document.body.removeChild(inputEle);
		
		$('#copyColorPickerResultHint').html(' ' + colorHexCode + '复制成功！');
		$('#copyColorPickerResultHint').show();
		setTimeout(function(){
			$('#copyColorPickerResultHint').hide();
		}, 1000); // 1秒后隐藏
	});
</script>
